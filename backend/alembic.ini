# Alembic configuration for the Pet Management System backend.
#
# The database URL is intentionally NOT set here — it is loaded from the
# environment (DATABASE_URL via app.config) inside migrations/env.py so that no
# credentials live in source control.

[alembic]
script_location = migrations
prepend_sys_path = .

# Migration filenames are prefixed with a zero-padded, monotonically increasing
# revision id (e.g. 001_initial_schema) for easy ordering at a glance.
# %%(rev)s is filled from each revision's `revision` value.
file_template = %%(rev)s_%%(slug)s

# Use OS-native path separators.
path_separator = os

# Timezone for migration timestamps.
timezone = UTC

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
